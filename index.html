<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Cloud VR | Hardware Control Center</title>
    <style>
        :root { --nexus-green: #00ff00; --nexus-blue: #00d4ff; --bg: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .nexus-card { border: 2px solid var(--nexus-green); border-radius: 15px; padding: 30px; display: inline-block; background: #111; box-shadow: 0 0 30px rgba(0, 255, 0, 0.15); max-width: 550px; }
        h1 { color: var(--nexus-green); letter-spacing: 4px; text-shadow: 0 0 10px var(--nexus-green); }
        .pwr-alert { background: #ffcc00; color: #000; padding: 8px; font-weight: bold; border-radius: 5px; margin: 15px 0; font-size: 0.8em; }
        .btn { display: block; width: 300px; padding: 15px; margin: 12px auto; font-weight: bold; text-decoration: none; border-radius: 8px; border: none; cursor: pointer; transition: 0.3s; }
        .btn-exe { background: #333; color: white; border: 1px solid #555; }
        .btn-exe:hover { border-color: var(--nexus-blue); color: var(--nexus-blue); }
        .btn-handshake { background: var(--nexus-green); color: #000; }
        .btn-handshake:hover { background: #fff; transform: scale(1.02); }
        #status-log { font-size: 0.85em; color: #888; margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="nexus-card">
        <h1>NEXUS CLOUD VR</h1>
        <div class="pwr-alert">⚡ 120W INPUT DETECTED | 60W PD HANDSHAKE REQUIRED</div>

        <!-- 1. OFFICIAL PC DOWNLOADS -->
        <p style="color: var(--nexus-blue);">[1] PC-SIDE DRIVER INSTALLERS</p>
        <a href="https://trinusvr.com" class="btn btn-exe" target="_blank">TRINUS VR SERVER (.EXE)</a>
        <a href="https://riftcat.com" class="btn btn-exe" target="_blank">VRIDGE SETUP (.EXE)</a>
        <a href="https://store.steampowered.com" class="btn btn-exe" target="_blank">iVRY STEAMVR DRIVER</a>

        <hr style="border: 0.5px solid #222; margin: 25px 0;">

        <!-- 2. USB CABLE & POWER HANDSHAKE -->
        <p style="color: var(--nexus-blue);">[2] HARDWARE DATA HANDSHAKE</p>
        <button class="btn btn-handshake" onclick="initUSBHandshake()">INITIATE CABLE HANDSHAKE</button>
        <div id="status-log">Device: Awaiting 120W Docking Cable...</div>
    </div>

    <script>
        /**
         * Nexus Cloud VR - WebUSB Data/Power Handshake
         * Negotiates 60W PD through the USB cable and HDMI dock
         */
        async function initUSBHandshake() {
            const log = document.getElementById('status-log');
            try {
                // 1. Request access to the USB Data Cable/Docking Station
                const device = await navigator.usb.requestDevice({ filters: [] });
                
                // 2. Open hardware session
                await device.open();
                
                // 3. Negotiate Configuration (Required for high-power E-Mark cables)
                if (device.configuration === null) {
                    await device.selectConfiguration(1);
                }
                
                // 4. Claim the Interface to force Data-Transfer mode
                await device.claimInterface(0);

                log.innerHTML = `<span style="color:var(--nexus-green)">✅ HANDSHAKE COMPLETE: ${device.productName || "Nexus Link"}</span><br>
                                 <span style="color:#fff">Status: 60W PD Verified | 4K HDMI Active</span>`;
                
                // Optional: Ping your Google Apps Script backend
                console.log("Nexus Cloud VR: Cable Handshake Successful.");
            } catch (err) {
                log.innerHTML = `<span style="color:#ff4444">❌ HANDSHAKE FAILED: ${err.message}</span>`;
            }
        }
    </script>
</body>
</html>
