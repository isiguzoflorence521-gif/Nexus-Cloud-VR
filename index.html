<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus Cloud VR | 120W Docking Dashboard</title>
    <style>
        body { background: #050505; color: #00d4ff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .dock-status { border: 2px solid #333; padding: 20px; border-radius: 15px; background: #111; display: inline-block; }
        .usb-btn { background: #00d4ff; color: #000; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .pwr-alert { color: #ffcc00; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="dock-status">
        <h1>NEXUS CLOUD VR</h1>
        <p class="pwr-alert">⚡ 120W HDMI DOCK DETECTED</p>
        
        <!-- WebUSB Connection -->
        <button class="btn usb-btn" id="connect-usb">CONNECT VIA WEBUSB</button>
        <p id="usb-msg">Waiting for USB Device...</p>

        <hr style="border: 0.5px solid #222; margin: 20px 0;">

 <div class="section-title">Step 1: Download PC Bridge Clients</div>
<div class="grid">
  <!-- Official Direct Download Links -->
  <a href="https://trinusvr.com/downloads/trinusvr/" class="btn" target="_blank">Trinus Server</a>
  <a href="https://riftcat.com" class="btn" target="_blank">VRidge Setup</a>
  <a href="https://store.steampowered.com/app/992490/iVRy_Driver_for_SteamVR/" class="btn" target="_blank">iVRy (SteamVR)</a>
  <a href="https://download.zerotier.com/dist/ZeroTier%20One.msi" class="btn" target="_blank">ZeroTier (V-LAN)</a>
</div>

    <script>
        // WebUSB API Implementation
        document.getElementById('connect-usb').addEventListener('click', async () => {
            try {
                const device = await navigator.usb.requestDevice({ filters: [] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                document.getElementById('usb-msg').innerText = "Connected to: " + device.productName;
            } catch (err) {
                document.getElementById('usb-msg').innerText = "USB Error: " + err;
            }
        });
    </script>
</body>
</html>
