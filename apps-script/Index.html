<!DOCTYPE html>
<html>
<head>
  <style>
    :root { --neon-blue: #00d4ff; --dark-bg: #050505; }
    body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .card { border: 1px solid var(--neon-blue); padding: 40px; border-radius: 15px; box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); text-align: center; }
    .btn { background: var(--neon-blue); color: black; border: none; padding: 15px 30px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; margin: 10px; }
    .btn:hover { background: white; box-shadow: 0 0 15px var(--neon-blue); }
    .status-dot { height: 10px; width: 10px; background-color: #bbb; border-radius: 50%; display: inline-block; margin-right: 5px; }
    .online { background-color: #00ff00; box-shadow: 0 0 8px #00ff00; }
  </style>
</head>
<body>
  <div class="card">
    <h1>NEXUS CLOUD VR</h1>
    <p><span id="dot" class="status-dot"></span> System Status: <span id="status">Ready</span></p>
    <button class="btn" onclick="launch('Trinus')">BOOT TRINUS</button>
    <button class="btn" onclick="launch('VRidge')">BOOT VRIDGE</button>
    <button class="btn" onclick="launch('iVRy')">BOOT iVRY</button>
  </div>
  <script>
    function launch(type) {
      document.getElementById('status').innerText = 'Initializing ' + type + '...';
      document.getElementById('dot').classList.add('online');
      google.script.run.withSuccessHandler(updateUI).startNexusServer(type);
    }
    function updateUI(res) { console.log(res); }
  </script>
</body>
</html>
